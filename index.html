<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Minecraft 3D - Текстуры 16x16 | 60 FPS</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #000;
    }
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 26px;
      height: 26px;
      pointer-events: none;
      z-index: 100;
      filter: drop-shadow(0 0 3px rgba(0,0,0,0.8));
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: white;
      opacity: 0.9;
    }
    #crosshair::before {
      width: 2px;
      height: 26px;
      left: 12px;
      top: 0;
    }
    #crosshair::after {
      width: 26px;
      height: 2px;
      left: 0;
      top: 12px;
    }
    #hotbar {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 3px;
      background: rgba(20,20,20,0.85);
      padding: 5px 8px;
      border-radius: 10px;
      z-index: 200;
      border: 2px solid #444;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    }
    .slot {
      width: 54px;
      height: 54px;
      background: rgba(30,30,30,0.9);
      border: 2px solid #3a3a3a;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      color: white;
      font-weight: bold;
      font-size: 13px;
      text-shadow: 2px 2px 0 #000;
      transition: all 0.15s;
      box-sizing: border-box;
      cursor: pointer;
    }
    .slot:hover {
      border-color: #888;
      background: rgba(50,50,50,0.9);
    }
    .slot.active {
      border-color: #fff;
      box-shadow: 0 0 15px #ffffffcc, inset 0 0 8px rgba(255,255,255,0.3);
      transform: scale(1.1);
      background: rgba(70,70,70,0.95);
    }
    .slot .count {
      position: absolute;
      bottom: 2px;
      right: 5px;
      font-size: 13px;
      color: #fff;
      text-shadow: 1px 1px 0 #000;
      background: rgba(0,0,0,0.5);
      padding: 0 4px;
      border-radius: 8px;
    }
    .slot .icon {
      width: 42px;
      height: 42px;
      image-rendering: pixelated;
      object-fit: contain;
    }
    #fps-counter {
      position: fixed;
      top: 15px;
      right: 15px;
      background: rgba(0,0,0,0.8);
      color: #0f0;
      padding: 5px 14px;
      border-radius: 15px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      z-index: 300;
      backdrop-filter: blur(4px);
      border: 1px solid #0f0;
    }
    #block-info {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 5px 18px;
      border-radius: 20px;
      font-size: 14px;
      backdrop-filter: blur(4px);
      pointer-events: none;
      z-index: 150;
    }
    #message {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,100,0.9);
      color: #000;
      padding: 5px 20px;
      border-radius: 15px;
      font-weight: bold;
      transition: 0.3s;
      opacity: 0;
      z-index: 150;
    }
  </style>
</head>
<body>
  <div id="crosshair"></div>
  <div id="fps-counter">FPS: 60</div>
  <div id="block-info">🎮 Нажмите для игры | WASD | Пробел | 1-9</div>
  <div id="message"></div>
  <div id="hotbar"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // ========== КОНСТАНТЫ ==========
    const TARGET_FPS = 60;
    const FRAME_TIME = 1000 / TARGET_FPS;
    const TEX_SIZE = 16; // 16x16 текстуры
    
    // ========== ЗВУКИ ==========
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playSound(type) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      
      switch(type) {
        case 'step':
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(80 + Math.random() * 50, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.07);
          osc.stop(audioCtx.currentTime + 0.07);
          break;
        case 'break':
          osc.type = 'square';
          osc.frequency.setValueAtTime(150, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
          osc.stop(audioCtx.currentTime + 0.12);
          break;
        case 'place':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(250, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
          osc.stop(audioCtx.currentTime + 0.1);
          break;
        case 'creeper':
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(60, audioCtx.currentTime);
          osc.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 0.8);
          gain.gain.linearRampToValueAtTime(0.35, audioCtx.currentTime + 0.4);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.0);
          osc.stop(audioCtx.currentTime + 1.0);
          break;
        default:
          osc.stop(audioCtx.currentTime + 0.05);
      }
      osc.start();
    }

    // ========== ГЕНЕРАТОР ТЕКСТУР 16x16 ==========
    function createCanvasTexture(width, height, drawFn) {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      drawFn(ctx, width, height);
      const texture = new THREE.CanvasTexture(canvas);
      texture.magFilter = THREE.NearestFilter;
      texture.minFilter = THREE.NearestFilter;
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      return texture;
    }

    function randomPixel(ctx, x, y, baseColor, variation = 30) {
      const r = Math.max(0, Math.min(255, ((baseColor >> 16) & 0xFF) + Math.floor(Math.random() * variation - variation/2)));
      const g = Math.max(0, Math.min(255, ((baseColor >> 8) & 0xFF) + Math.floor(Math.random() * variation - variation/2)));
      const b = Math.max(0, Math.min(255, (baseColor & 0xFF) + Math.floor(Math.random() * variation - variation/2)));
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x, y, 1, 1);
    }

    function fillTexture(ctx, width, height, baseColor, noise = 25) {
      for (let x = 0; x < width; x++) {
        for (let y = 0; y < height; y++) {
          randomPixel(ctx, x, y, baseColor, noise);
        }
      }
    }

    // Генерация всех текстур
    const textures = {};
    
    function generateAllTextures() {
      // Трава (верх)
      textures.grass_top = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0x6B9B37, 20);
        // Добавляем травинки
        ctx.fillStyle = '#4a7a20';
        for (let i = 0; i < 12; i++) {
          ctx.fillRect(Math.floor(Math.random()*w), Math.floor(Math.random()*h), 2, 1);
        }
      });
      
      // Трава (бок)
      textures.grass_side = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0x8B6B4D, 15);
        // Верхняя полоса травы
        for (let x = 0; x < w; x++) {
          for (let y = 0; y < 4; y++) {
            randomPixel(ctx, x, y, 0x6B9B37, 15);
          }
        }
      });
      
      // Земля
      textures.dirt = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0x8B5A2B, 20);
        // Камешки
        for (let i = 0; i < 8; i++) {
          ctx.fillStyle = '#6B4226';
          ctx.fillRect(Math.floor(Math.random()*w), Math.floor(Math.random()*h), 2, 2);
        }
      });
      
      // Камень
      textures.stone = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0x7F7F7F, 25);
        // Трещины
        ctx.strokeStyle = '#5a5a5a';
        ctx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          ctx.moveTo(Math.random()*w, Math.random()*h);
          ctx.lineTo(Math.random()*w, Math.random()*h);
          ctx.stroke();
        }
      });
      
      // Булыжник
      textures.cobblestone = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0x6B6B6B, 20);
        // Камни
        for (let i = 0; i < 10; i++) {
          const sx = Math.floor(Math.random()*12)+2;
          const sy = Math.floor(Math.random()*12)+2;
          ctx.fillStyle = '#555';
          ctx.fillRect(sx, sy, 3, 3);
          ctx.fillStyle = '#777';
          ctx.fillRect(sx+1, sy+1, 1, 1);
        }
      });
      
      // Песок
      textures.sand = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0xE8D9A0, 15);
        // Точки
        for (let i = 0; i < 20; i++) {
          ctx.fillStyle = '#d4c48a';
          ctx.fillRect(Math.floor(Math.random()*w), Math.floor(Math.random()*h), 1, 1);
        }
      });
      
      // Гравий
      textures.gravel = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0x9B8B7A, 20);
        for (let i = 0; i < 15; i++) {
          const sx = Math.floor(Math.random()*14)+1;
          const sy = Math.floor(Math.random()*14)+1;
          ctx.fillStyle = '#7a6b5a';
          ctx.fillRect(sx, sy, 2, 2);
        }
      });
      
      // Дубовое бревно (бок)
      textures.oak_log = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0x8B6B4D, 12);
        // Кора
        ctx.strokeStyle = '#6B4B2D';
        ctx.lineWidth = 1;
        for (let y = 2; y < h; y += 4) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(w, y + Math.floor(Math.random()*3)-1);
          ctx.stroke();
        }
      });
      
      // Дубовое бревно (верх)
      textures.oak_log_top = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0xA0704D, 10);
        // Годовые кольца
        ctx.strokeStyle = '#8B6040';
        ctx.lineWidth = 1;
        for (let r = 2; r < 7; r += 1.5) {
          ctx.beginPath();
          ctx.arc(w/2, h/2, r, 0, Math.PI*2);
          ctx.stroke();
        }
      });
      
      // Листва дуба
      textures.oak_leaves = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0x3A7728, 25);
        // Пятна листьев
        for (let i = 0; i < 15; i++) {
          ctx.fillStyle = `rgba(${30+Math.random()*40},${80+Math.random()*60},${20+Math.random()*30},0.7)`;
          ctx.fillRect(Math.floor(Math.random()*w), Math.floor(Math.random()*h), 3, 3);
        }
      });
      
      // Березовое бревно
      textures.birch_log = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0xD4C4A8, 10);
        ctx.strokeStyle = '#C4B498';
        ctx.lineWidth = 1;
        for (let y = 2; y < h; y += 5) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(w, y);
          ctx.stroke();
        }
      });
      
      textures.birch_log_top = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0xE4D4B8, 8);
        ctx.strokeStyle = '#D4C4A8';
        ctx.lineWidth = 1;
        for (let r = 2; r < 7; r += 1.5) {
          ctx.beginPath();
          ctx.arc(w/2, h/2, r, 0, Math.PI*2);
          ctx.stroke();
        }
      });
      
      // Листва березы
      textures.birch_leaves = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0x5C8F4A, 20);
        for (let i = 0; i < 12; i++) {
          ctx.fillStyle = `rgba(70,160,70,0.6)`;
          ctx.fillRect(Math.floor(Math.random()*w), Math.floor(Math.random()*h), 3, 3);
        }
      });
      
      // Доски
      textures.planks = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0xBC8F4F, 10);
        ctx.strokeStyle = '#A07040';
        ctx.lineWidth = 1;
        for (let y = 0; y < h; y += 4) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(w, y);
          ctx.stroke();
        }
      });
      
      // Стекло
      textures.glass = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        ctx.fillStyle = 'rgba(170, 221, 255, 0.3)';
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.lineWidth = 1;
        ctx.strokeRect(1, 1, w-2, h-2);
        // Блик
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(2, 2, 3, 3);
      });
      
      // Кирпичи
      textures.bricks = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0xB53C1A, 15);
        ctx.strokeStyle = '#8B2500';
        ctx.lineWidth = 1;
        // Горизонтальные линии
        for (let y = 0; y < h; y += 4) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(w, y);
          ctx.stroke();
        }
        // Вертикальные линии со смещением
        for (let y = 0; y < h; y += 8) {
          for (let x = 0; x < w; x += 8) {
            ctx.beginPath();
            ctx.moveTo(x + (y % 16 < 8 ? 4 : 0), y);
            ctx.lineTo(x + (y % 16 < 8 ? 4 : 0), y + 4);
            ctx.stroke();
          }
        }
      });
      
      // Книжные полки
      textures.bookshelf = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0xD2B48C, 10);
        // Полки
        for (let y = 4; y < h; y += 4) {
          ctx.fillStyle = '#8B6B4D';
          ctx.fillRect(0, y, w, 1);
        }
        // Книги
        const colors = ['#ff4444', '#4444ff', '#44ff44', '#ffff44', '#ff44ff'];
        for (let i = 0; i < 8; i++) {
          ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
          ctx.fillRect(2 + Math.floor(Math.random()*12), 1 + Math.floor(Math.random()*3)*4, 2, 3);
        }
      });
      
      // Обсидиан
      textures.obsidian = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0x1A1A2E, 15);
        // Фиолетовые прожилки
        ctx.strokeStyle = '#4a2060';
        ctx.lineWidth = 1;
        for (let i = 0; i < 6; i++) {
          ctx.beginPath();
          ctx.moveTo(Math.random()*w, Math.random()*h);
          ctx.lineTo(Math.random()*w, Math.random()*h);
          ctx.stroke();
        }
      });
      
      // Руды
      const createOreTexture = (stoneColor, oreColor) => createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, stoneColor, 20);
        // Вкрапления руды
        for (let i = 0; i < 8; i++) {
          const sx = Math.floor(Math.random()*12)+2;
          const sy = Math.floor(Math.random()*12)+2;
          ctx.fillStyle = oreColor;
          ctx.fillRect(sx, sy, 2, 2);
          ctx.fillStyle = '#fff';
          ctx.fillRect(sx, sy, 1, 1);
        }
      });
      
      textures.diamond_ore = createOreTexture(0x7F7F7F, '#4DD0E1');
      textures.gold_ore = createOreTexture(0x7F7F7F, '#FFD54F');
      textures.iron_ore = createOreTexture(0x7F7F7F, '#D7CCC8');
      textures.coal_ore = createOreTexture(0x7F7F7F, '#424242');
      
      // Вода
      textures.water = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        ctx.fillStyle = 'rgba(30, 60, 180, 0.6)';
        ctx.fillRect(0, 0, w, h);
        // Волны
        for (let x = 0; x < w; x += 2) {
          for (let y = 0; y < h; y += 2) {
            if (Math.random() > 0.5) {
              ctx.fillStyle = 'rgba(255,255,255,0.3)';
              ctx.fillRect(x, y, 1, 1);
            }
          }
        }
      });
      
      // Лава
      textures.lava = createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        fillTexture(ctx, w, h, 0xFF4500, 20);
        // Яркие пятна
        for (let i = 0; i < 10; i++) {
          ctx.fillStyle = '#FFAA00';
          ctx.fillRect(Math.floor(Math.random()*w), Math.floor(Math.random()*h), 2, 2);
        }
        for (let i = 0; i < 5; i++) {
          ctx.fillStyle = '#FFFF00';
          ctx.fillRect(Math.floor(Math.random()*w), Math.floor(Math.random()*h), 1, 1);
        }
      });
    }
    
    generateAllTextures();

    // ========== ТИПЫ БЛОКОВ ==========
    const BLOCK_TYPES = {
      AIR: 0, GRASS: 1, DIRT: 2, STONE: 3, COBBLESTONE: 4,
      SAND: 5, GRAVEL: 6, OAK_LOG: 7, OAK_LEAVES: 8,
      BIRCH_LOG: 9, BIRCH_LEAVES: 10, PLANKS: 11, GLASS: 12,
      BRICKS: 13, BOOKSHELF: 14, OBSIDIAN: 15, DIAMOND_ORE: 16,
      GOLD_ORE: 17, IRON_ORE: 18, COAL_ORE: 19, WATER: 20, LAVA: 21
    };

    // ========== ИНСТРУМЕНТЫ ==========
    const TOOLS = {
      WOOD_PICK: 'wood_pick', STONE_PICK: 'stone_pick',
      IRON_PICK: 'iron_pick', AXE: 'axe', SHOVEL: 'shovel'
    };
    
    const toolTextures = {};
    function generateToolTextures() {
      const createToolTex = (color) => createCanvasTexture(TEX_SIZE, TEX_SIZE, (ctx, w, h) => {
        ctx.fillStyle = color;
        ctx.fillRect(6, 2, 4, 12);
        ctx.fillStyle = '#8B6B4D';
        ctx.fillRect(7, 1, 2, 14);
      });
      
      toolTextures[TOOLS.WOOD_PICK] = createToolTex('#BC8F4F');
      toolTextures[TOOLS.STONE_PICK] = createToolTex('#7F7F7F');
      toolTextures[TOOLS.IRON_PICK] = createToolTex('#D7CCC8');
      toolTextures[TOOLS.AXE] = createToolTex('#BC8F4F');
      toolTextures[TOOLS.SHOVEL] = createToolTex('#BC8F4F');
    }
    generateToolTextures();
    
    function getToolMultiplier(tool, blockType) {
      const b = BLOCK_TYPES;
      if (tool === TOOLS.SHOVEL && [b.DIRT, b.SAND, b.GRAVEL].includes(blockType)) return 6.0;
      if (tool === TOOLS.AXE && [b.OAK_LOG, b.BIRCH_LOG, b.PLANKS].includes(blockType)) return 5.0;
      if (tool === TOOLS.WOOD_PICK) {
        if ([b.STONE, b.COBBLESTONE].includes(blockType)) return 1.5;
        if ([b.DIRT, b.SAND].includes(blockType)) return 2.5;
      }
      if (tool === TOOLS.STONE_PICK) {
        if ([b.STONE, b.COBBLESTONE, b.IRON_ORE, b.COAL_ORE].includes(blockType)) return 3.0;
        if ([b.DIAMOND_ORE, b.GOLD_ORE].includes(blockType)) return 1.8;
      }
      if (tool === TOOLS.IRON_PICK) {
        if ([b.STONE, b.COBBLESTONE, b.OBSIDIAN, b.DIAMOND_ORE, b.GOLD_ORE, b.IRON_ORE, b.COAL_ORE].includes(blockType)) return 5.0;
      }
      return 1.0;
    }

    // ========== ИНВЕНТАРЬ ==========
    class Inventory {
      constructor() {
        this.slots = new Array(9).fill(null);
        this.addItem(BLOCK_TYPES.DIRT, 20);
        this.addItem(BLOCK_TYPES.STONE, 10);
        this.addItem(BLOCK_TYPES.PLANKS, 15);
        this.addItem(TOOLS.WOOD_PICK, 1);
        this.addItem(TOOLS.STONE_PICK, 1);
        this.addItem(TOOLS.AXE, 1);
        this.addItem(TOOLS.SHOVEL, 1);
        this.addItem(BLOCK_TYPES.GLASS, 8);
        this.addItem(BLOCK_TYPES.OAK_LOG, 12);
        this.activeSlot = 0;
      }
      addItem(type, count = 1) {
        for (let i = 0; i < this.slots.length; i++) {
          if (this.slots[i] && this.slots[i].type === type) {
            this.slots[i].count += count;
            return;
          }
        }
        for (let i = 0; i < this.slots.length; i++) {
          if (!this.slots[i]) {
            this.slots[i] = { type, count };
            return;
          }
        }
      }
      removeItem(slotIndex, count = 1) {
        if (!this.slots[slotIndex]) return false;
        this.slots[slotIndex].count -= count;
        if (this.slots[slotIndex].count <= 0) this.slots[slotIndex] = null;
        return true;
      }
      getActiveItem() {
        return this.slots[this.activeSlot];
      }
    }

    // ========== ИГРОК ==========
    class Player {
      constructor(camera, scene) {
        this.camera = camera;
        this.scene = scene;
        this.velocity = new THREE.Vector3();
        this.onGround = false;
        this.height = 1.8;
        this.speed = 5.5;
        this.jumpPower = 6.5;
        this.raycaster = new THREE.Raycaster();
        this.raycaster.far = 2.0;
      }
      update(delta, world) {
        const move = new THREE.Vector3();
        if (keys.forward) move.z -= 1;
        if (keys.backward) move.z += 1;
        if (keys.left) move.x -= 1;
        if (keys.right) move.x += 1;
        
        if (move.length() > 0) {
          move.normalize();
          if (this.onGround && Math.random() < 0.03) playSound('step');
        }
        move.multiplyScalar(this.speed * delta);
        this.camera.position.x += move.x;
        this.camera.position.z += move.z;
        
        this.velocity.y -= 15 * delta;
        this.camera.position.y += this.velocity.y * delta;
        
        this.onGround = false;
        const pos = this.camera.position;
        const footPos = pos.clone().add(new THREE.Vector3(0, -this.height, 0));
        this.raycaster.set(footPos, new THREE.Vector3(0, -1, 0));
        const hits = this.raycaster.intersectObjects(world.visibleBlocks);
        if (hits.length > 0 && hits[0].distance < 0.3) {
          this.camera.position.y = hits[0].point.y + this.height;
          this.velocity.y = 0;
          this.onGround = true;
        }
        
        const checkCollision = (dir) => {
          this.raycaster.set(pos, dir, 0.5);
          return this.raycaster.intersectObjects(world.visibleBlocks).length > 0;
        };
        
        if (checkCollision(new THREE.Vector3(1,0,0))) this.camera.position.x -= 0.15;
        if (checkCollision(new THREE.Vector3(-1,0,0))) this.camera.position.x += 0.15;
        if (checkCollision(new THREE.Vector3(0,0,1))) this.camera.position.z -= 0.15;
        if (checkCollision(new THREE.Vector3(0,0,-1))) this.camera.position.z += 0.15;
      }
      jump() {
        if (this.onGround) {
          this.velocity.y = this.jumpPower;
          this.onGround = false;
        }
      }
    }

    // ========== МИР ==========
    class World {
      constructor(scene) {
        this.scene = scene;
        this.group = new THREE.Group();
        this.blocks = new Map();
        this.visibleBlocks = [];
        this.geometry = new THREE.BoxGeometry(0.98, 0.98, 0.98);
        this.generate();
        scene.add(this.group);
      }
      
      getMaterialForBlock(type) {
        let materials;
        switch(type) {
          case BLOCK_TYPES.GRASS:
            materials = [
              new THREE.MeshStandardMaterial({ map: textures.grass_side, roughness: 0.9 }),
              new THREE.MeshStandardMaterial({ map: textures.grass_side, roughness: 0.9 }),
              new THREE.MeshStandardMaterial({ map: textures.grass_top, roughness: 0.9 }),
              new THREE.MeshStandardMaterial({ map: textures.dirt, roughness: 0.9 }),
              new THREE.MeshStandardMaterial({ map: textures.grass_side, roughness: 0.9 }),
              new THREE.MeshStandardMaterial({ map: textures.grass_side, roughness: 0.9 })
            ];
            break;
          case BLOCK_TYPES.DIRT:
            materials = new THREE.MeshStandardMaterial({ map: textures.dirt, roughness: 0.9 });
            break;
          case BLOCK_TYPES.STONE:
            materials = new THREE.MeshStandardMaterial({ map: textures.stone, roughness: 0.7 });
            break;
          case BLOCK_TYPES.COBBLESTONE:
            materials = new THREE.MeshStandardMaterial({ map: textures.cobblestone, roughness: 0.8 });
            break;
          case BLOCK_TYPES.SAND:
            materials = new THREE.MeshStandardMaterial({ map: textures.sand, roughness: 0.95 });
            break;
          case BLOCK_TYPES.GRAVEL:
            materials = new THREE.MeshStandardMaterial({ map: textures.gravel, roughness: 0.9 });
            break;
          case BLOCK_TYPES.OAK_LOG:
            materials = [
              new THREE.MeshStandardMaterial({ map: textures.oak_log, roughness: 0.85 }),
              new THREE.MeshStandardMaterial({ map: textures.oak_log, roughness: 0.85 }),
              new THREE.MeshStandardMaterial({ map: textures.oak_log_top, roughness: 0.85 }),
              new THREE.MeshStandardMaterial({ map: textures.oak_log_top, roughness: 0.85 }),
              new THREE.MeshStandardMaterial({ map: textures.oak_log, roughness: 0.85 }),
              new THREE.MeshStandardMaterial({ map: textures.oak_log, roughness: 0.85 })
            ];
            break;
          case BLOCK_TYPES.OAK_LEAVES:
            materials = new THREE.MeshStandardMaterial({ map: textures.oak_leaves, roughness: 0.8, transparent: true });
            break;
          case BLOCK_TYPES.BIRCH_LOG:
            materials = [
              new THREE.MeshStandardMaterial({ map: textures.birch_log, roughness: 0.85 }),
              new THREE.MeshStandardMaterial({ map: textures.birch_log, roughness: 0.85 }),
              new THREE.MeshStandardMaterial({ map: textures.birch_log_top, roughness: 0.85 }),
              new THREE.MeshStandardMaterial({ map: textures.birch_log_top, roughness: 0.85 }),
              new THREE.MeshStandardMaterial({ map: textures.birch_log, roughness: 0.85 }),
              new THREE.MeshStandardMaterial({ map: textures.birch_log, roughness: 0.85 })
            ];
            break;
          case BLOCK_TYPES.BIRCH_LEAVES:
            materials = new THREE.MeshStandardMaterial({ map: textures.birch_leaves, roughness: 0.8, transparent: true });
            break;
          case BLOCK_TYPES.PLANKS:
            materials = new THREE.MeshStandardMaterial({ map: textures.planks, roughness: 0.8 });
            break;
          case BLOCK_TYPES.GLASS:
            materials = new THREE.MeshStandardMaterial({ map: textures.glass, roughness: 0.1, transparent: true, opacity: 0.5 });
            break;
          case BLOCK_TYPES.BRICKS:
            materials = new THREE.MeshStandardMaterial({ map: textures.bricks, roughness: 0.8 });
            break;
          case BLOCK_TYPES.BOOKSHELF:
            materials = new THREE.MeshStandardMaterial({ map: textures.bookshelf, roughness: 0.7 });
            break;
          case BLOCK_TYPES.OBSIDIAN:
            materials = new THREE.MeshStandardMaterial({ map: textures.obsidian, roughness: 0.3 });
            break;
          case BLOCK_TYPES.DIAMOND_ORE:
            materials = new THREE.MeshStandardMaterial({ map: textures.diamond_ore, roughness: 0.6 });
            break;
          case BLOCK_TYPES.GOLD_ORE:
            materials = new THREE.MeshStandardMaterial({ map: textures.gold_ore, roughness: 0.6 });
            break;
          case BLOCK_TYPES.IRON_ORE:
            materials = new THREE.MeshStandardMaterial({ map: textures.iron_ore, roughness: 0.6 });
            break;
          case BLOCK_TYPES.COAL_ORE:
            materials = new THREE.MeshStandardMaterial({ map: textures.coal_ore, roughness: 0.6 });
            break;
          case BLOCK_TYPES.WATER:
            materials = new THREE.MeshStandardMaterial({ map: textures.water, roughness: 0.1, transparent: true, opacity: 0.6 });
            break;
          case BLOCK_TYPES.LAVA:
            materials = new THREE.MeshStandardMaterial({ map: textures.lava, roughness: 0.2, emissive: 0xff4400, emissiveIntensity: 0.4 });
            break;
          default:
            materials = new THREE.MeshStandardMaterial({ color: 0xff00ff, roughness: 0.5 });
        }
        return materials;
      }
      
      setBlock(x, y, z, type) {
        const key = `${x},${y},${z}`;
        if (this.blocks.has(key)) {
          const old = this.blocks.get(key);
          this.group.remove(old);
          const idx = this.visibleBlocks.indexOf(old);
          if (idx > -1) this.visibleBlocks.splice(idx, 1);
          this.blocks.delete(key);
        }
        if (type === BLOCK_TYPES.AIR) return;
        
        const mesh = new THREE.Mesh(this.geometry, this.getMaterialForBlock(type));
        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData = { type, x, y, z };
        
        this.group.add(mesh);
        this.blocks.set(key, mesh);
        this.visibleBlocks.push(mesh);
      }
      
      getBlock(x, y, z) {
        return this.blocks.get(`${Math.round(x)},${Math.round(y)},${Math.round(z)}`);
      }
      
      removeBlock(x, y, z) {
        this.setBlock(x, y, z, BLOCK_TYPES.AIR);
      }
      
      generate() {
        const size = 24;
        const halfSize = size / 2;
        for (let x = -halfSize; x < halfSize; x++) {
          for (let z = -halfSize; z < halfSize; z++) {
            const height = Math.floor(Math.sin(x * 0.25) * 2 + Math.cos(z * 0.25) * 2 + 6);
            for (let y = 0; y < height; y++) {
              let type;
              if (y === height - 1) type = BLOCK_TYPES.GRASS;
              else if (y > height - 4) type = BLOCK_TYPES.DIRT;
              else type = BLOCK_TYPES.STONE;
              if (Math.random() < 0.03 && y === height - 1) type = BLOCK_TYPES.SAND;
              this.setBlock(x, y, z, type);
            }
          }
        }
        for (let i = 0; i < 15; i++) {
          const rx = Math.floor(Math.random() * size) - halfSize;
          const rz = Math.floor(Math.random() * size) - halfSize;
          const ry = Math.floor(Math.random() * 4) + 1;
          const ores = [BLOCK_TYPES.COAL_ORE, BLOCK_TYPES.IRON_ORE, BLOCK_TYPES.GOLD_ORE, BLOCK_TYPES.DIAMOND_ORE];
          this.setBlock(rx, ry, rz, ores[Math.floor(Math.random() * ores.length)]);
        }
        // Деревья
        for (let i = 0; i < 8; i++) {
          const tx = Math.floor(Math.random() * size) - halfSize;
          const tz = Math.floor(Math.random() * size) - halfSize;
          const ty = Math.floor(Math.sin(tx * 0.25) * 2 + Math.cos(tz * 0.25) * 2 + 6);
          if (this.getBlock(tx, ty-1, tz)) {
            this.setBlock(tx, ty, tz, BLOCK_TYPES.OAK_LOG);
            this.setBlock(tx, ty+1, tz, BLOCK_TYPES.OAK_LOG);
            this.setBlock(tx, ty+2, tz, BLOCK_TYPES.OAK_LOG);
            this.setBlock(tx, ty+3, tz, BLOCK_TYPES.OAK_LEAVES);
            for (let dx = -1; dx <= 1; dx++) {
              for (let dz = -1; dz <= 1; dz++) {
                if (Math.abs(dx) + Math.abs(dz) <= 2) {
                  this.setBlock(tx+dx, ty+3, tz+dz, BLOCK_TYPES.OAK_LEAVES);
                  if (Math.random() > 0.5) this.setBlock(tx+dx, ty+4, tz+dz, BLOCK_TYPES.OAK_LEAVES);
                }
              }
            }
          }
        }
      }
    }

    // ========== NPC ==========
    class NPC {
      constructor(scene, type, position) {
        this.scene = scene;
        this.type = type;
        this.mesh = new THREE.Group();
        this.mesh.position.copy(position);
        this.direction = Math.random() * Math.PI * 2;
        this.timer = Math.random() * 100;
        this.targetPlayer = false;
        this.buildModel();
        scene.add(this.mesh);
      }
      buildModel() {
        const group = this.mesh;
        const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        if (this.type === 'villager') {
          const body = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: 0x8B5A2B, roughness: 0.9}));
          body.scale.set(0.8, 1.0, 0.5);
          body.position.y = 0.7;
          group.add(body);
          const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xF5D0B0, roughness: 0.7}));
          head.position.y = 1.35;
          group.add(head);
        } else if (this.type === 'pig') {
          const body = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: 0xF9A8B8, roughness: 0.8}));
          body.scale.set(0.9, 0.6, 0.7);
          body.position.y = 0.5;
          group.add(body);
          const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.5), new THREE.MeshStandardMaterial({color: 0xF9A8B8, roughness: 0.8}));
          head.position.set(0, 0.8, 0.6);
          group.add(head);
        } else if (this.type === 'golem') {
          const body = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: 0xAAAAAA, roughness: 0.6}));
          body.scale.set(1.4, 1.8, 0.9);
          body.position.y = 1.2;
          group.add(body);
          const head = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.9, 0.9), new THREE.MeshStandardMaterial({color: 0xCCCCCC, roughness: 0.5}));
          head.position.y = 2.3;
          group.add(head);
        } else if (this.type === 'creeper') {
          const body = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: 0x4CAF50, roughness: 0.7}));
          body.scale.set(0.7, 1.2, 0.5);
          body.position.y = 0.8;
          group.add(body);
          const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0x4CAF50, roughness: 0.7}));
          head.position.y = 1.6;
          group.add(head);
        }
      }
      update(delta, world, playerPos) {
        this.timer += delta;
        const pos = this.mesh.position;
        if (this.type === 'creeper') {
          const dist = pos.distanceTo(playerPos);
          this.targetPlayer = dist < 5;
          if (this.targetPlayer) {
            const dir = new THREE.Vector3().subVectors(playerPos, pos).setY(0).normalize();
            pos.x += dir.x * delta * 2.5;
            pos.z += dir.z * delta * 2.5;
            if (dist < 1.8) this.explode(world);
            return;
          }
        }
        if (this.timer > 2.5) {
          this.direction = Math.random() * Math.PI * 2;
          this.timer = 0;
        }
        pos.x += Math.cos(this.direction) * delta * 1.2;
        pos.z += Math.sin(this.direction) * delta * 1.2;
        const below = world.getBlock(Math.round(pos.x), Math.round(pos.y - 0.8), Math.round(pos.z));
        if (!below) pos.y -= 5 * delta;
        else pos.y = Math.round(pos.y);
      }
      explode(world) {
        playSound('creeper');
        const center = this.mesh.position.clone();
        for (let dx = -1; dx <= 1; dx++)
          for (let dz = -1; dz <= 1; dz++)
            for (let dy = -1; dy <= 1; dy++)
              world.removeBlock(Math.round(center.x + dx), Math.round(center.y + dy), Math.round(center.z + dz));
        this.mesh.visible = false;
        setTimeout(() => { this.mesh.visible = true; }, 5000);
      }
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 20, 50);
    
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 80);
    camera.position.set(0, 12, 15);
    
    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);
    
    const controls = new PointerLockControls(camera, renderer.domElement);
    scene.add(controls.getObject());
    
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(30, 40, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 256;
    sun.shadow.mapSize.height = 256;
    sun.shadow.camera.far = 50;
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x404066));
    
    const world = new World(scene);
    const player = new Player(camera, scene);
    const inventory = new Inventory();
    
    const npcs = [
      new NPC(scene, 'villager', new THREE.Vector3(4, 8, 3)),
      new NPC(scene, 'villager', new THREE.Vector3(-3, 8, -4)),
      new NPC(scene, 'villager', new THREE.Vector3(0, 9, 5)),
      new NPC(scene, 'pig', new THREE.Vector3(5, 8, 6)),
      new NPC(scene, 'pig', new THREE.Vector3(-5, 8, -3)),
      new NPC(scene, 'pig', new THREE.Vector3(2, 9, -5)),
      new NPC(scene, 'golem', new THREE.Vector3(7, 8, -2)),
      new NPC(scene, 'creeper', new THREE.Vector3(-6, 8, 7))
    ];
    
    const highlightRaycaster = new THREE.Raycaster();
    highlightRaycaster.far = 5;
    let highlightedBlock = null;
    const outlineMesh = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(1.02, 1.02, 1.02)),
      new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 })
    );
    scene.add(outlineMesh);
    outlineMesh.visible = false;
    
    // UI
    function updateHotbarUI() {
      const hotbar = document.getElementById('hotbar');
      hotbar.innerHTML = '';
      inventory.slots.forEach((item, idx) => {
        const slot = document.createElement('div');
        slot.className = 'slot' + (idx === inventory.activeSlot ? ' active' : '');
        if (item) {
          let display = '';
          let icon = '';
          if (typeof item.type === 'string') {
            display = item.type.replace('_', ' ').toUpperCase();
            icon = '🔧';
          } else {
            const key = Object.keys(BLOCK_TYPES).find(k => BLOCK_TYPES[k] === item.type);
            display = key || '?';
            icon = '🧱';
          }
          slot.innerHTML = `<span>${icon}</span><span class="count">${item.count}</span>`;
        }
        slot.addEventListener('click', () => { inventory.activeSlot = idx; updateHotbarUI(); });
        hotbar.appendChild(slot);
      });
    }
    updateHotbarUI();
    
    const keys = { forward: false, backward: false, left: false, right: false };
    document.addEventListener('keydown', (e) => {
      if (!controls.isLocked) return;
      switch(e.code) {
        case 'KeyW': keys.forward = true; break;
        case 'KeyS': keys.backward = true; break;
        case 'KeyA': keys.left = true; break;
        case 'KeyD': keys.right = true; break;
        case 'Space': player.jump(); break;
        case 'Digit1': case 'Digit2': case 'Digit3': case 'Digit4': case 'Digit5':
        case 'Digit6': case 'Digit7': case 'Digit8': case 'Digit9':
          inventory.activeSlot = parseInt(e.code.replace('Digit', '')) - 1;
          updateHotbarUI();
          break;
      }
    });
    document.addEventListener('keyup', (e) => {
      switch(e.code) {
        case 'KeyW': keys.forward = false; break;
        case 'KeyS': keys.backward = false; break;
        case 'KeyA': keys.left = false; break;
        case 'KeyD': keys.right = false; break;
      }
    });
    
    renderer.domElement.addEventListener('click', () => {
      initAudio();
      controls.lock();
    });
    
    let destroyProgress = 0;
    let currentTarget = null;
    
    function updateBlockInteraction() {
      if (!controls.isLocked) return;
      highlightRaycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      const hits = highlightRaycaster.intersectObjects(world.visibleBlocks);
      if (hits.length > 0 && hits[0].distance < 5) {
        outlineMesh.position.copy(hits[0].object.position);
        outlineMesh.visible = true;
        highlightedBlock = hits[0].object;
      } else {
        outlineMesh.visible = false;
        highlightedBlock = null;
        currentTarget = null;
        destroyProgress = 0;
      }
    }
    
    function mineBlock() {
      if (!highlightedBlock) return;
      if (currentTarget !== highlightedBlock) { destroyProgress = 0; currentTarget = highlightedBlock; }
      const tool = inventory.getActiveItem()?.type;
      const mult = getToolMultiplier(tool, currentTarget.userData.type);
      destroyProgress += 0.025 * mult;
      if (destroyProgress >= 1.0) {
        const type = currentTarget.userData.type;
        const pos = currentTarget.position;
        world.removeBlock(pos.x, pos.y, pos.z);
        inventory.addItem(type, 1);
        updateHotbarUI();
        playSound('break');
        destroyProgress = 0;
        currentTarget = null;
        outlineMesh.visible = false;
      }
    }
    
    function placeBlock() {
      if (!highlightedBlock) return;
      const active = inventory.getActiveItem();
      if (!active || typeof active.type === 'string') return;
      highlightRaycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      const hits = highlightRaycaster.intersectObjects(world.visibleBlocks);
      if (hits.length > 0) {
        const normal = hits[0].face.normal.clone();
        const placePos = new THREE.Vector3(
          Math.round(hits[0].point.x + normal.x * 0.5),
          Math.round(hits[0].point.y + normal.y * 0.5),
          Math.round(hits[0].point.z + normal.z * 0.5)
        );
        if (!world.getBlock(placePos.x, placePos.y, placePos.z)) {
          world.setBlock(placePos.x, placePos.y, placePos.z, active.type);
          inventory.removeItem(inventory.activeSlot, 1);
          updateHotbarUI();
          playSound('place');
        }
      }
    }
    
    let mouseDown = false;
    window.addEventListener('mousedown', (e) => {
      if (!controls.isLocked) return;
      mouseDown = true;
      if (e.button === 0) mineBlock();
      if (e.button === 2) placeBlock();
    });
    window.addEventListener('mouseup', () => { mouseDown = false; });
    window.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('wheel', (e) => {
      if (!controls.isLocked) return;
      inventory.activeSlot = e.deltaY > 0 ? (inventory.activeSlot + 1) % 9 : (inventory.activeSlot + 8) % 9;
      updateHotbarUI();
    });
    
    // FPS
    let frameCount = 0, lastFpsTime = performance.now(), currentFPS = 60;
    const fpsElement = document.getElementById('fps-counter');
    let lastFrameTime = performance.now();
    
    function gameLoop(currentTime) {
      requestAnimationFrame(gameLoop);
      const elapsed = currentTime - lastFrameTime;
      if (elapsed < FRAME_TIME) return;
      const delta = Math.min(elapsed / 1000, 0.05);
      lastFrameTime = currentTime - (elapsed % FRAME_TIME);
      
      frameCount++;
      if (currentTime - lastFpsTime >= 1000) {
        currentFPS = Math.round(frameCount * 1000 / (currentTime - lastFpsTime));
        fpsElement.textContent = `FPS: ${currentFPS}`;
        frameCount = 0;
        lastFpsTime = currentTime;
      }
      
      player.update(delta, world);
      npcs.forEach(n => n.update(delta, world, camera.position));
      updateBlockInteraction();
      if (controls.isLocked && currentTarget && mouseDown) mineBlock();
      renderer.render(scene, camera);
    }
    
    requestAnimationFrame(gameLoop);
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    console.log('🎮 Игра с текстурами 16x16 готова!');
  </script>
</body>
