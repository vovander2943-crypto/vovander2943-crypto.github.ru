<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🎴 Коллекционер случайных картинок | Picsum</title>
  <!-- Подключаем современный шрифт для красивого дизайна -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a1e2b 0%, #2a2f3f 100%);
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1.5rem;
      margin: 0;
      color: #eef1f5;
    }

    .game-container {
      max-width: 900px;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(20, 24, 33, 0.7);
      border-radius: 2.5rem;
      padding: 2.2rem 2rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: 2rem;
      transition: all 0.2s ease;
    }

    h1 {
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #f0b27a, #e8966b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.2rem;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    h1 span {
      font-size: 2rem;
    }

    .fetch-section {
      display: flex;
      justify-content: center;
    }

    .primary-btn {
      background: linear-gradient(135deg, #ff9a5c, #ff6f3c);
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1.25rem;
      color: #fff;
      letter-spacing: 0.3px;
      cursor: pointer;
      box-shadow: 0 12px 25px rgba(255, 111, 60, 0.35);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(5px);
    }

    .primary-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 35px rgba(255, 111, 60, 0.5);
      background: linear-gradient(135deg, #ffaa6b, #ff7a45);
    }

    .primary-btn:active {
      transform: translateY(2px);
      box-shadow: 0 5px 15px rgba(255, 111, 60, 0.5);
    }

    .current-card {
      background: rgba(12, 15, 20, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.6);
      transition: opacity 0.35s ease, transform 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .image-frame {
      width: 100%;
      max-height: 420px;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 15px 25px rgba(0,0,0,0.5);
      background: #1e2128;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      aspect-ratio: 16 / 10;
      background: linear-gradient(135deg, #2d3340, #1b1f2a);
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, opacity 0.5s;
    }

    .image-frame img:hover {
      transform: scale(1.02);
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.7rem 1.5rem;
      border-radius: 2.5rem;
      font-weight: 500;
      font-size: 1rem;
      color: #dddfe6;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      box-shadow: 0 5px 12px rgba(0,0,0,0.3);
    }

    .secondary-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255,255,255,0.4);
      color: white;
      transform: translateY(-2px);
    }

    .danger-btn {
      background: rgba(220, 70, 70, 0.15);
      border-color: rgba(255, 100, 100, 0.5);
      color: #ffb3b3;
    }
    .danger-btn:hover {
      background: rgba(220, 70, 70, 0.3);
      color: #ffe5e5;
    }

    .inventory-title {
      font-weight: 600;
      font-size: 1.5rem;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #cfd4e0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 0.8rem;
    }

    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1.2rem;
      margin-top: 0.8rem;
    }

    .inventory-item {
      background: rgba(20, 22, 28, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 1.2rem;
      overflow: hidden;
      box-shadow: 0 10px 18px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
    }

    .inventory-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 28px rgba(0,0,0,0.7);
      border-color: rgba(255,255,255,0.25);
    }

    .inventory-preview {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .item-actions {
      padding: 0.6rem;
      display: flex;
      justify-content: center;
    }

    .tiny-btn {
      background: rgba(255, 80, 80, 0.2);
      border: 1px solid rgba(255, 100, 100, 0.45);
      color: #ffaaaa;
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .tiny-btn:hover {
      background: rgba(255, 70, 70, 0.5);
      color: white;
      border-color: rgba(255,255,255,0.6);
    }

    .empty-state {
      text-align: center;
      color: #8892a4;
      padding: 2rem 1rem;
      font-style: italic;
      background: rgba(255,255,255,0.02);
      border-radius: 1.5rem;
      font-size: 1rem;
    }

    @media (max-width: 500px) {
      .game-container {
        padding: 1.5rem 1rem;
      }
      .action-buttons {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>
      <span>🖼️</span> Случайный коллекционер
    </h1>

    <!-- Кнопка получить случайную картинку -->
    <div class="fetch-section">
      <button id="fetchRandomBtn" class="primary-btn">
        <span>🎲</span> Получить случайную картинку
      </button>
    </div>

    <!-- Карточка текущего изображения (изначально скрыта) -->
    <div id="currentImageCard" class="current-card" style="display: none;">
      <div class="image-frame">
        <img id="currentImage" src="" alt="Случайное изображение" />
      </div>
      <div class="action-buttons">
        <button id="saveToInventoryBtn" class="secondary-btn">
          <span>💾</span> Сохранить в инвентарь
        </button>
        <button id="removeCurrentBtn" class="secondary-btn danger-btn">
          <span>🗑️</span> Удалить
        </button>
      </div>
    </div>

    <!-- Инвентарь -->
    <div>
      <div class="inventory-title">
        <span>📦</span> Ваш инвентарь
      </div>
      <div id="inventoryContainer" class="inventory-grid">
        <!-- Динамически заполняется из localStorage -->
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- DOM элементы ----------
      const fetchBtn = document.getElementById('fetchRandomBtn');
      const currentCard = document.getElementById('currentImageCard');
      const currentImage = document.getElementById('currentImage');
      const saveBtn = document.getElementById('saveToInventoryBtn');
      const removeCurrentBtn = document.getElementById('removeCurrentBtn');
      const inventoryContainer = document.getElementById('inventoryContainer');

      // ---------- Состояние ----------
      // Текущий URL картинки (чтобы знать, что сохранять)
      let currentImageUrl = null;
      // Ключ для localStorage
      const STORAGE_KEY = 'random_image_collector_inventory';

      // ---------- Вспомогательные функции ----------
      function getInventoryFromStorage() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
            const parsed = JSON.parse(stored);
            // Убедимся, что это массив строк (url)
            if (Array.isArray(parsed)) {
              return parsed.filter(item => typeof item === 'string' && item.startsWith('http'));
            }
          }
        } catch (e) {
          console.warn('Ошибка чтения localStorage, сбрасываем.', e);
        }
        return [];
      }

      function saveInventoryToStorage(inventoryArray) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventoryArray));
      }

      // Рендер инвентаря на основе переданного массива (или из хранилища)
      function renderInventory(inventory = null) {
        const items = inventory !== null ? inventory : getInventoryFromStorage();
        
        if (!items || items.length === 0) {
          inventoryContainer.innerHTML = `<div class="empty-state">✨ Пока здесь пусто. Сохраните первую картинку!</div>`;
          return;
        }

        let html = '';
        items.forEach((url, index) => {
          html += `
            <div class="inventory-item" data-index="${index}">
              <img src="${url}" alt="Saved item" class="inventory-preview" loading="lazy" />
              <div class="item-actions">
                <button class="tiny-btn" data-action="delete-inventory" data-index="${index}">
                  <span>🗑️</span> Удалить
                </button>
              </div>
            </div>
          `;
        });
        inventoryContainer.innerHTML = html;

        // Навешиваем обработчики на кнопки удаления из инвентаря
        document.querySelectorAll('[data-action="delete-inventory"]').forEach(btn => {
          btn.addEventListener('click', function(e) {
            const index = parseInt(this.getAttribute('data-index'), 10);
            deleteInventoryItem(index);
          });
        });
      }

      // Удаление элемента инвентаря по индексу
      function deleteInventoryItem(index) {
        const inventory = getInventoryFromStorage();
        if (index >= 0 && index < inventory.length) {
          inventory.splice(index, 1);
          saveInventoryToStorage(inventory);
          renderInventory(inventory);
        }
      }

      // Показать текущую карточку с изображением
      function displayCurrentImage(url) {
        if (!url) {
          currentCard.style.display = 'none';
          currentImageUrl = null;
          return;
        }
        currentImageUrl = url;
        currentImage.src = url;
        currentImage.alt = 'Случайное изображение';
        currentCard.style.display = 'flex';
        // Небольшая анимация появления
        currentCard.style.opacity = '0';
        currentCard.style.transform = 'scale(0.98)';
        setTimeout(() => {
          currentCard.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
          currentCard.style.opacity = '1';
          currentCard.style.transform = 'scale(1)';
        }, 10);
      }

      // Скрыть текущую карточку
      function hideCurrentCard() {
        currentCard.style.display = 'none';
        currentImageUrl = null;
        currentImage.src = '';
      }

      // ---------- API запрос: Lorem Picsum (случайное изображение) ----------
      async function fetchRandomImage() {
        try {
          // Используем Lorem Picsum для получения случайного изображения.
          // Добавляем случайный параметр, чтобы избежать кеширования и получать каждый раз новое.
          const randomId = Math.floor(Math.random() * 1000) + 1; // от 1 до 1000
          // Можно также использовать https://picsum.photos/800/500?random=2 и т.д.
          // Но чтобы URL был уникальным и сохраняемым, используем прямую ссылку на изображение по ID.
          // Однако picsum.photos/id/.../width/height тоже работает.
          // Более надёжно: используем список? Нет, используем прямую ссылку с рандомным параметром.
          // Например: https://picsum.photos/seed/{random}/800/500
          const seed = Math.random().toString(36).substring(2, 15) + Date.now();
          const width = 800;
          const height = 500;
          // Этот URL всегда возвращает случайное изображение, и при сохранении оно остаётся постоянным.
          const imageUrl = `https://picsum.photos/seed/${seed}/${width}/${height}`;
          
          // Дополнительно: чтобы удостовериться, что изображение загружается, можно предварительно создать объект Image,
          // но для простоты сразу отображаем. Браузер сам подгрузит.
          displayCurrentImage(imageUrl);
        } catch (error) {
          console.error('Ошибка получения изображения:', error);
          alert('Не удалось загрузить случайное изображение. Попробуйте ещё раз.');
        }
      }

      // ---------- Обработчики событий ----------
      // Получить случайную картинку
      fetchBtn.addEventListener('click', () => {
        fetchRandomImage();
      });

      // Сохранить в инвентарь
      saveBtn.addEventListener('click', () => {
        if (!currentImageUrl) {
          alert('Сначала получите случайную картинку!');
          return;
        }
        const inventory = getInventoryFromStorage();
        // Проверим, нет ли уже такого же URL (на всякий случай, но можем разрешить дубликаты? 
        // Обычно в коллекциях дубликаты не страшны, но для порядка можно не добавлять точную копию.
        // Однако пользователь может захотеть сохранить несколько раз. Разрешим дубликаты, т.к. seed может повторяться редко.
        inventory.push(currentImageUrl);
        saveInventoryToStorage(inventory);
        renderInventory(inventory);
        
        // Визуальная обратная связь
        saveBtn.style.transform = 'scale(0.95)';
        setTimeout(() => { saveBtn.style.transform = ''; }, 150);
      });

      // Удалить текущую картинку (просто скрыть, инвентарь не трогаем)
      removeCurrentBtn.addEventListener('click', () => {
        hideCurrentCard();
      });

      // Инициализация: загружаем инвентарь из localStorage и рендерим
      function initialRender() {
        const inventory = getInventoryFromStorage();
        renderInventory(inventory);
        // Скрываем текущую карточку, если нет активного изображения
        hideCurrentCard();
      }

      // Запускаем
      initialRender();

      // Дополнительно: если пользователь случайно обновит страницу, текущая картинка пропадает - это ожидаемое поведение.
      // Никаких утечек.
    })();
  </script>
</body>
</html>
