<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>Игра 2048 | Классическая головоломка</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #faf8ef 0%, #f5f0e5 100%);
      font-family: 'Segoe UI', 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      color: #776e65;
    }

    .game-container {
      background: #ffffffdd;
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 25px 25px 30px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15), 0 10px 20px rgba(0, 0, 0, 0.08);
      max-width: 500px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .title-section {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    h1 {
      font-size: 3.2rem;
      font-weight: 800;
      color: #776e65;
      letter-spacing: -1px;
      line-height: 1;
      text-shadow: 2px 2px 0 rgba(187, 173, 160, 0.2);
    }

    .scores {
      display: flex;
      gap: 12px;
    }

    .score-box {
      background: #bbada0;
      border-radius: 12px;
      padding: 10px 20px;
      text-align: center;
      color: white;
      font-weight: 700;
      box-shadow: 0 6px 0 #9c8a7c;
      min-width: 80px;
    }

    .score-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #f0e6d9;
    }

    .score-value {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .new-game-btn {
      background: #8f7a66;
      border: none;
      color: white;
      font-weight: 800;
      font-size: 1.1rem;
      padding: 14px 22px;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 6px 0 #6b5e4f;
      transition: all 0.1s ease;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      background: #8f7a66;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .new-game-btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #6b5e4f;
    }

    .new-game-btn:hover {
      background: #9c8874;
    }

    .game-board {
      position: relative;
      background: #bbada0;
      border-radius: 16px;
      padding: 12px;
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 12px;
      box-shadow: inset 0 0 0 2px rgba(187, 173, 160, 0.3), 0 15px 25px rgba(0,0,0,0.2);
    }

    .cell {
      background: #cdc1b4;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 2.2rem;
      color: #776e65;
      transition: all 0.15s ease-in-out;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.15);
      aspect-ratio: 1 / 1;
      user-select: none;
    }

    /* Цвета плиток */
    .tile-2 {
      background: #eee4da;
      color: #776e65;
    }
    .tile-4 {
      background: #ede0c8;
      color: #776e65;
    }
    .tile-8 {
      background: #f2b179;
      color: #f9f6f2;
    }
    .tile-16 {
      background: #f59563;
      color: white;
    }
    .tile-32 {
      background: #f77c5f;
      color: white;
    }
    .tile-64 {
      background: #f75f3b;
      color: white;
    }
    .tile-128 {
      background: #edcf72;
      color: white;
      font-size: 2rem;
      box-shadow: 0 0 15px rgba(243, 215, 116, 0.6);
    }
    .tile-256 {
      background: #edcc61;
      color: white;
      font-size: 2rem;
      box-shadow: 0 0 18px rgba(243, 210, 100, 0.7);
    }
    .tile-512 {
      background: #edc850;
      color: white;
      font-size: 2rem;
      box-shadow: 0 0 22px rgba(243, 200, 70, 0.8);
    }
    .tile-1024 {
      background: #edc53f;
      color: white;
      font-size: 1.8rem;
      box-shadow: 0 0 26px rgba(240, 190, 50, 0.9);
    }
    .tile-2048 {
      background: #edc22e;
      color: white;
      font-size: 1.8rem;
      box-shadow: 0 0 30px rgba(255, 200, 0, 1);
      animation: pulse 0.8s infinite alternate;
    }
    .tile-super {
      background: #3c3a32;
      color: white;
      font-size: 1.5rem;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }

    .message-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(250, 248, 239, 0.9);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      visibility: hidden;
      opacity: 0;
      transition: 0.3s ease;
      border-radius: inherit;
    }

    .message-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .message-box {
      background: white;
      padding: 35px 45px;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 30px 45px rgba(0,0,0,0.25);
      font-weight: 800;
      font-size: 2.2rem;
      color: #776e65;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message-box button {
      background: #8f7a66;
      border: none;
      color: white;
      font-weight: bold;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 6px 0 #5f5244;
      transition: 0.1s ease;
      margin-top: 5px;
    }

    .message-box button:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #5f5244;
    }

    .footer-note {
      margin-top: 15px;
      color: #b39f8b;
      font-weight: 500;
      font-size: 0.9rem;
    }

    @media (max-width: 450px) {
      .cell {
        font-size: 1.8rem;
      }
      h1 {
        font-size: 2.8rem;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div class="title-section">
      <h1>2048</h1>
    </div>
    <div class="scores">
      <div class="score-box">
        <div class="score-label">Счёт</div>
        <div class="score-value" id="scoreDisplay">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Рекорд</div>
        <div class="score-value" id="bestDisplay">0</div>
      </div>
    </div>
  </div>
  <button class="new-game-btn" id="newGameButton">
    <span>↺</span> Новая игра
  </button>

  <div class="game-board" id="gameBoard"></div>
  <div class="footer-note">←↑↓→ / свайпы на телефоне</div>
</div>

<div class="message-overlay" id="messageOverlay">
  <div class="message-box" id="messageBox">
    <span id="messageText">Вы победили!</span>
    <button id="messageCloseBtn">Продолжить</button>
  </div>
</div>

<script>
  (function() {
    // --- Игровое состояние ---
    const SIZE = 4;
    let board = [];
    let score = 0;
    let bestScore = 0;
    let gameOverFlag = false;
    let winAchieved = false; // чтобы показывать победное сообщение один раз

    // DOM элементы
    const gameBoardEl = document.getElementById('gameBoard');
    const scoreDisplayEl = document.getElementById('scoreDisplay');
    const bestDisplayEl = document.getElementById('bestDisplay');
    const newGameBtn = document.getElementById('newGameButton');
    const messageOverlay = document.getElementById('messageOverlay');
    const messageText = document.getElementById('messageText');
    const messageCloseBtn = document.getElementById('messageCloseBtn');

    // --- Инициализация / сброс ---
    function loadBestScore() {
      try {
        const saved = localStorage.getItem('2048_best');
        return saved ? parseInt(saved, 10) : 0;
      } catch (e) {
        return 0;
      }
    }

    function saveBestScore(value) {
      try {
        localStorage.setItem('2048_best', value);
      } catch (e) {
        // игнорируем ошибки localStorage
      }
    }

    function updateBestScore(newScore) {
      if (newScore > bestScore) {
        bestScore = newScore;
        saveBestScore(bestScore);
        bestDisplayEl.textContent = bestScore;
      }
    }

    // Создать пустую доску
    function createEmptyBoard() {
      return Array(SIZE).fill().map(() => Array(SIZE).fill(0));
    }

    // Добавить случайную плитку (2 с вероятностью 90%, 4 — 10%)
    function addRandomTile(boardState) {
      const emptyCells = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (boardState[r][c] === 0) emptyCells.push({ r, c });
        }
      }
      if (emptyCells.length === 0) return false;

      const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
      boardState[r][c] = Math.random() < 0.9 ? 2 : 4;
      return true;
    }

    // Инициализация новой игры
    function initGame() {
      board = createEmptyBoard();
      score = 0;
      gameOverFlag = false;
      winAchieved = false;
      messageOverlay.classList.remove('active');

      // Добавляем две стартовые плитки
      addRandomTile(board);
      addRandomTile(board);

      updateScoreDisplay();
      renderBoard();
    }

    // Сброс игры (кнопка Новая игра)
    function newGame() {
      initGame();
      // не сбрасываем рекорд, просто обновляем отображение best
      bestDisplayEl.textContent = bestScore;
    }

    // --- Логика движения ---
    function slideAndMerge(row) {
      // Убираем нули
      let filtered = row.filter(val => val !== 0);
      let merged = [];
      let skipNext = false;

      for (let i = 0; i < filtered.length; i++) {
        if (skipNext) {
          skipNext = false;
          continue;
        }
        if (i < filtered.length - 1 && filtered[i] === filtered[i + 1]) {
          const mergedValue = filtered[i] * 2;
          merged.push(mergedValue);
          score += mergedValue;
          skipNext = true;
        } else {
          merged.push(filtered[i]);
        }
      }

      // Дополняем нулями до размера SIZE
      while (merged.length < SIZE) {
        merged.push(0);
      }
      return merged;
    }

    // Движение влево (для каждой строки)
    function moveLeft(boardState) {
      let moved = false;
      const newBoard = boardState.map(row => {
        const originalRow = [...row];
        const newRow = slideAndMerge(originalRow);
        if (JSON.stringify(originalRow) !== JSON.stringify(newRow)) {
          moved = true;
        }
        return newRow;
      });
      return { board: newBoard, moved };
    }

    // Движение вправо (реверс -> slide -> реверс)
    function moveRight(boardState) {
      let moved = false;
      const newBoard = boardState.map(row => {
        const reversed = [...row].reverse();
        const merged = slideAndMerge(reversed);
        const newRow = merged.reverse();
        if (JSON.stringify(row) !== JSON.stringify(newRow)) {
          moved = true;
        }
        return newRow;
      });
      return { board: newBoard, moved };
    }

    // Транспонирование матрицы
    function transpose(matrix) {
      return matrix[0].map((_, colIndex) => matrix.map(row => row[colIndex]));
    }

    // Движение вверх
    function moveUp(boardState) {
      const transposed = transpose(boardState);
      const { board: movedBoard, moved } = moveLeft(transposed);
      const newBoard = transpose(movedBoard);
      return { board: newBoard, moved };
    }

    // Движение вниз
    function moveDown(boardState) {
      const transposed = transpose(boardState);
      const { board: movedBoard, moved } = moveRight(transposed);
      const newBoard = transpose(movedBoard);
      return { board: newBoard, moved };
    }

    // Проверка возможности хода (есть ли пустые ячейки или соседние одинаковые)
    function canMove(boardState) {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (boardState[r][c] === 0) return true;
          if (c < SIZE - 1 && boardState[r][c] === boardState[r][c + 1]) return true;
          if (r < SIZE - 1 && boardState[r][c] === boardState[r + 1][c]) return true;
        }
      }
      return false;
    }

    // Проверка победы (наличие 2048) и вызов сообщения
    function checkWinCondition() {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] === 2048 && !winAchieved) {
            winAchieved = true;
            showMessage('🎉 Вы достигли 2048!', true);
            return;
          }
        }
      }
    }

    // Основное действие после хода
    function performMove(direction) {
      if (gameOverFlag) {
        // Если игра окончена, но пользователь нажимает стрелки, можно показать сообщение или ничего
        return;
      }

      let moveResult;
      switch (direction) {
        case 'left': moveResult = moveLeft(board); break;
        case 'right': moveResult = moveRight(board); break;
        case 'up': moveResult = moveUp(board); break;
        case 'down': moveResult = moveDown(board); break;
        default: return;
      }

      if (moveResult.moved) {
        board = moveResult.board;
        addRandomTile(board);
        updateScoreDisplay();
        renderBoard();
        checkWinCondition();

        // Проверка на окончание игры
        if (!canMove(board)) {
          gameOverFlag = true;
          showMessage('😔 Игра окончена!', false);
        }
      }
      // Если не сдвинулось — ничего не делаем
    }

    function updateScoreDisplay() {
      scoreDisplayEl.textContent = score;
      updateBestScore(score);
    }

    // --- Отображение ---
    function renderBoard() {
      gameBoardEl.innerHTML = '';
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const value = board[r][c];
          const cell = document.createElement('div');
          cell.className = 'cell';
          if (value !== 0) {
            cell.textContent = value;
            // Определяем класс плитки
            if (value <= 2048) {
              cell.classList.add(`tile-${value}`);
            } else {
              cell.classList.add('tile-super'); // для чисел > 2048
            }
          }
          gameBoardEl.appendChild(cell);
        }
      }
    }

    // Показ оверлея с сообщением
    function showMessage(text, isWin = false) {
      messageText.textContent = text;
      messageOverlay.classList.add('active');
      // Если это победа, кнопка "Продолжить" позволяет играть дальше
      // Если проигрыш, кнопка тоже позволяет начать заново, но меняем текст?
      if (!isWin) {
        messageCloseBtn.textContent = 'Новая игра';
      } else {
        messageCloseBtn.textContent = 'Продолжить';
      }
    }

    function hideMessage() {
      messageOverlay.classList.remove('active');
      // Если игра была окончена (проигрыш), при нажатии на кнопку в оверлее начинаем новую игру
      if (gameOverFlag) {
        newGame();
      }
      // Если это было окно победы и пользователь нажал "Продолжить", просто закрываем и играем дальше.
      // gameOverFlag при победе не true, так что newGame не вызовется.
    }

    // --- Обработчики событий ---
    function handleKeyDown(e) {
      const key = e.key;
      // Предотвращаем скролл страницы стрелками
      if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight') {
        e.preventDefault();
        if (key === 'ArrowUp') performMove('up');
        else if (key === 'ArrowDown') performMove('down');
        else if (key === 'ArrowLeft') performMove('left');
        else if (key === 'ArrowRight') performMove('right');
      }
    }

    // Поддержка свайпов для мобильных устройств
    let touchStartX = 0;
    let touchStartY = 0;
    const minSwipeDistance = 30;

    function handleTouchStart(e) {
      if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }
    }

    function handleTouchEnd(e) {
      if (!touchStartX || !touchStartY) return;

      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;

      const dx = touchEndX - touchStartX;
      const dy = touchEndY - touchStartY;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);

      if (Math.max(absDx, absDy) < minSwipeDistance) {
        // Слишком короткий свайп
        touchStartX = 0;
        touchStartY = 0;
        return;
      }

      e.preventDefault(); // чтобы не скроллилась страница при свайпе по полю

      if (absDx > absDy) {
        // Горизонтальный свайп
        if (dx > 0) performMove('right');
        else performMove('left');
      } else {
        // Вертикальный свайп
        if (dy > 0) performMove('down');
        else performMove('up');
      }

      // Сброс координат
      touchStartX = 0;
      touchStartY = 0;
    }

    // Привязка событий
    function bindEvents() {
      window.addEventListener('keydown', handleKeyDown);

      // Свайпы на игровом поле
      gameBoardEl.addEventListener('touchstart', handleTouchStart, { passive: false });
      gameBoardEl.addEventListener('touchend', handleTouchEnd, { passive: false });
      // Предотвращаем нежелательное поведение touchmove
      gameBoardEl.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

      newGameBtn.addEventListener('click', newGame);
      messageCloseBtn.addEventListener('click', hideMessage);
    }

    // Старт
    function startGame() {
      bestScore = loadBestScore();
      bestDisplayEl.textContent = bestScore;
      initGame();
      bindEvents();
    }

    startGame();
  })();
</script>
</body>
</html>
