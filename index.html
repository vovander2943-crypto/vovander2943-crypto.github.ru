<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Общий холст 50x50 • Рисуем вместе</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1a1e2b 0%, #2a3142 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px;
      margin: 0;
    }
    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border-radius: 2.5rem;
      padding: 2.2rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    h1 {
      color: #f0e9e1;
      font-weight: 500;
      font-size: 1.9rem;
      letter-spacing: 2px;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
      margin-bottom: -0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    h1 span {
      background: #f7b731;
      color: #1e1e2f;
      font-size: 1rem;
      font-weight: bold;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      letter-spacing: 0.5px;
    }
    .canvas-wrapper {
      background: #0b0d14;
      border-radius: 28px;
      padding: 12px;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 18px 30px rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      width: 500px;
      height: 500px;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      border-radius: 16px;
      box-shadow: 0 0 0 2px rgba(255, 200, 100, 0.3);
      background: #1c1c24;
      cursor: crosshair;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      background: rgba(20, 22, 31, 0.7);
      backdrop-filter: blur(15px);
      padding: 1rem 2rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .color-picker {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      background: rgba(0,0,0,0.3);
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
    }
    .color-picker label {
      color: #ccc;
      font-weight: 500;
      font-size: 0.9rem;
    }
    input[type="color"] {
      width: 42px;
      height: 42px;
      border: 2px solid white;
      border-radius: 50%;
      cursor: pointer;
      background: transparent;
      padding: 2px;
    }
    .btn-group {
      display: flex;
      gap: 0.6rem;
    }
    button {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #e0e0e0;
      padding: 0.7rem 1.5rem;
      border-radius: 2.5rem;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.4px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(45, 50, 70, 0.5);
    }
    button:hover {
      background: #f7b731;
      color: #12121c;
      border-color: #f7b731;
      box-shadow: 0 8px 20px rgba(247, 183, 49, 0.4);
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(1px);
    }
    .status {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #b9c6da;
      font-size: 0.9rem;
      margin-left: 0.5rem;
    }
    .indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff5e57;
      box-shadow: 0 0 12px #ff5e57;
    }
    .indicator.connected {
      background: #2ed573;
      box-shadow: 0 0 15px #2ed573;
    }
    .user-hint {
      color: #9aa4bf;
      font-size: 0.8rem;
      text-align: center;
      margin-top: -0.3rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>
    🎨 ПИКСЕЛЬНЫЙ МИР
    <span>50x50</span>
  </h1>

  <div class="canvas-wrapper">
    <canvas id="sharedCanvas" width="50" height="50"></canvas>
  </div>

  <div class="toolbar">
    <div class="color-picker">
      <label for="colorPicker">🎨</label>
      <input type="color" id="colorPicker" value="#f7b731">
    </div>
    <div class="btn-group">
      <button id="clearBtn" title="Очистить холст (для всех)">🗑️ Очистить</button>
    </div>
    <div class="status">
      <span id="connectionIndicator" class="indicator"></span>
      <span id="statusText">подключение...</span>
    </div>
  </div>
  <div class="user-hint">
    ✦ Кликните или рисуйте, удерживая кнопку мыши ✦ Изменения видят все игроки онлайн ✦
  </div>
</div>

<script>
  (function() {
    // ---------- НАСТРОЙКИ ----------
    const CANVAS_SIZE = 50;
    const PIXEL_SCALE = 10; // для отображения (50*10 = 500px)

    // Публичный WebSocket-сервер (бесплатный, общий для демонстрации)
    // Используем бесплатный сервис echoes (можно заменить на свой)
    const WS_SERVER = 'wss://broadcast-channel.glitch.me/'; 
    // ⚠️ ВАЖНО: Это демонстрационный публичный сервер. 
    // В реальном проекте замените на свой WebSocket-сервер.
    // Сервер должен ретранслировать сообщения всем клиентам (broadcast).

    // ---------- ЭЛЕМЕНТЫ ----------
    const canvas = document.getElementById('sharedCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const colorPicker = document.getElementById('colorPicker');
    const clearBtn = document.getElementById('clearBtn');
    const connectionIndicator = document.getElementById('connectionIndicator');
    const statusText = document.getElementById('statusText');

    // ---------- СОСТОЯНИЕ ----------
    let ws = null;
    let connected = false;
    let reconnectTimer = null;
    let currentColor = colorPicker.value;

    // Хранилище пикселей (50x50) — каждый пиксель RGBA строка или объект.
    // Будем хранить как одномерный массив строк цветов (hex) для простоты.
    let pixelData = new Array(CANVAS_SIZE * CANVAS_SIZE).fill('#1c1c24'); // фон по умолчанию

    // Флаг для предотвращения бесконечных циклов при получении своих же сообщений
    let localUpdate = false;

    // ---------- ИНИЦИАЛИЗАЦИЯ ХОЛСТА ----------
    function initCanvasBackground() {
      // Заполняем холст фоном
      ctx.fillStyle = '#1c1c24';
      ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
      // Загружаем pixelData в холст
      for (let y = 0; y < CANVAS_SIZE; y++) {
        for (let x = 0; x < CANVAS_SIZE; x++) {
          const index = y * CANVAS_SIZE + x;
          const color = pixelData[index];
          if (color && color !== '#1c1c24') {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);
          }
        }
      }
    }

    // Обновить холст из массива pixelData
    function renderFullCanvas() {
      for (let y = 0; y < CANVAS_SIZE; y++) {
        for (let x = 0; x < CANVAS_SIZE; x++) {
          const index = y * CANVAS_SIZE + x;
          ctx.fillStyle = pixelData[index] || '#1c1c24';
          ctx.fillRect(x, y, 1, 1);
        }
      }
    }

    // Установить пиксель (и отправить, если не из сети)
    function setPixel(x, y, color, broadcast = true) {
      if (x < 0 || x >= CANVAS_SIZE || y < 0 || y >= CANVAS_SIZE) return;
      const index = y * CANVAS_SIZE + x;
      if (pixelData[index] === color) return; // без изменений

      pixelData[index] = color;
      ctx.fillStyle = color;
      ctx.fillRect(x, y, 1, 1);

      if (broadcast && ws && connected) {
        sendPixelUpdate(x, y, color);
      }
    }

    // Отправка обновления пикселя
    function sendPixelUpdate(x, y, color) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const message = JSON.stringify({
        type: 'pixel',
        x: x,
        y: y,
        color: color
      });
      try {
        ws.send(message);
      } catch (e) {
        console.warn('Ошибка отправки:', e);
      }
    }

    // Отправка очистки холста
    function sendClearCanvas() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const message = JSON.stringify({
        type: 'clear',
        color: '#1c1c24' // цвет фона
      });
      try {
        ws.send(message);
      } catch (e) {
        console.warn('Ошибка отправки clear:', e);
      }
    }

    // Очистить локально и отправить всем
    function clearCanvasAction() {
      // Заполняем массив фоновым цветом
      pixelData.fill('#1c1c24');
      renderFullCanvas();
      sendClearCanvas();
    }

    // ---------- ОБРАБОТЧИКИ СООБЩЕНИЙ WEB-SOCKET ----------
    function handleMessage(event) {
      try {
        const data = JSON.parse(event.data);
        if (!data || !data.type) return;

        // Игнорируем сообщения, которые сами же и отправили (если сервер не echo с фильтрацией)
        // Но публичный сервер может возвращать нам же. Используем флаг localUpdate для защиты,
        // но проще проверять: если сообщение пришло и мы его применяем, перерисовываем.
        // Чтобы избежать двойной перерисовки при локальном изменении, будем временно блокировать.
        if (localUpdate) return;

        switch (data.type) {
          case 'pixel':
            if (typeof data.x === 'number' && typeof data.y === 'number' && data.color) {
              // Устанавливаем пиксель БЕЗ повторной отправки (broadcast = false)
              setPixel(data.x, data.y, data.color, false);
            }
            break;
          case 'clear':
            // Очистка от другого игрока
            pixelData.fill(data.color || '#1c1c24');
            renderFullCanvas();
            break;
          case 'canvasState':
            // Если сервер присылает полное состояние холста (массив цветов)
            if (Array.isArray(data.pixels) && data.pixels.length === CANVAS_SIZE * CANVAS_SIZE) {
              pixelData = [...data.pixels];
              renderFullCanvas();
            }
            break;
          default:
            break;
        }
      } catch (e) {
        console.warn('Ошибка обработки сообщения:', e);
      }
    }

    // ---------- ПОДКЛЮЧЕНИЕ К СЕРВЕРУ ----------
    function connectWebSocket() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        return;
      }

      // Закрываем предыдущее соединение, если есть
      if (ws) {
        ws.onclose = null;
        ws.onerror = null;
        ws.onmessage = null;
        if (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING) {
          ws.close();
        }
      }

      statusText.textContent = 'подключение...';
      connectionIndicator.classList.remove('connected');

      try {
        ws = new WebSocket(WS_SERVER);
      } catch (e) {
        console.error('Ошибка создания WebSocket:', e);
        scheduleReconnect();
        return;
      }

      ws.onopen = () => {
        connected = true;
        statusText.textContent = 'онлайн (совместное рисование)';
        connectionIndicator.classList.add('connected');
        console.log('WebSocket подключён');

        // Запрашиваем текущее состояние холста (если сервер поддерживает)
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'requestCanvas' }));
        }
        // Сбрасываем таймер реконнекта
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
      };

      ws.onmessage = (event) => {
        // Чтобы избежать конфликта локальных изменений,
        // устанавливаем флаг, если сообщение пришло не от нас.
        // Публичный сервер часто шлёт нам наши же сообщения.
        // Простейшая защита: если сообщение содержит пиксель, который мы только что установили,
        // можно игнорировать. Но мы сделаем через временную блокировку при локальной отрисовке.
        // Более надёжно: сравнивать с последними отправленными данными. 
        // Для простоты используем флаг localUpdate.
        handleMessage(event);
      };

      ws.onerror = (error) => {
        console.error('Ошибка WebSocket:', error);
        connected = false;
        statusText.textContent = 'ошибка соединения';
        connectionIndicator.classList.remove('connected');
      };

      ws.onclose = (event) => {
        connected = false;
        statusText.textContent = 'соединение прервано';
        connectionIndicator.classList.remove('connected');
        console.log('WebSocket закрыт');
        ws = null;
        scheduleReconnect();
      };
    }

    function scheduleReconnect() {
      if (reconnectTimer) clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => {
        console.log('Попытка переподключения...');
        connectWebSocket();
      }, 3000);
    }

    // ---------- ОБРАБОТЧИКИ ХОЛСТА (РИСОВАНИЕ) ----------
    function getCanvasCoordsFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = CANVAS_SIZE / rect.width;   // отношение реального размера к CSS
      const scaleY = CANVAS_SIZE / rect.height;

      let clientX, clientY;

      if (e.touches) {
        // Сенсорное устройство
        if (e.touches.length === 0) return null;
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
        e.preventDefault();
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }

      // Координаты относительно canvas с учётом масштаба
      const canvasX = (clientX - rect.left) * scaleX;
      const canvasY = (clientY - rect.top) * scaleY;

      const x = Math.floor(canvasX);
      const y = Math.floor(canvasY);

      if (x >= 0 && x < CANVAS_SIZE && y >= 0 && y < CANVAS_SIZE) {
        return { x, y };
      }
      return null;
    }

    let isDrawing = false;

    function drawAtPosition(e) {
      const coords = getCanvasCoordsFromEvent(e);
      if (!coords) return;

      // Устанавливаем флаг, чтобы входящее сообщение не дублировало отрисовку
      // (публичный сервер возвращает нам наше сообщение)
      localUpdate = true;
      setPixel(coords.x, coords.y, currentColor, true);
      // Снимаем флаг после микро-задержки, чтобы серверное эхо не сработало
      setTimeout(() => {
        localUpdate = false;
      }, 50);
    }

    function onMouseDown(e) {
      e.preventDefault();
      isDrawing = true;
      drawAtPosition(e);
    }

    function onMouseMove(e) {
      if (!isDrawing) return;
      e.preventDefault();
      drawAtPosition(e);
    }

    function onMouseUp(e) {
      if (isDrawing) {
        isDrawing = false;
      }
    }

    function onMouseLeave(e) {
      // Если мышь покидает холст, прекращаем рисование
      if (isDrawing) {
        isDrawing = false;
      }
    }

    // Сенсорные события
    function onTouchStart(e) {
      e.preventDefault();
      isDrawing = true;
      drawAtPosition(e);
    }

    function onTouchMove(e) {
      e.preventDefault();
      if (!isDrawing) return;
      drawAtPosition(e);
    }

    function onTouchEnd(e) {
      e.preventDefault();
      isDrawing = false;
    }

    // ---------- ПРИВЯЗКА СОБЫТИЙ ----------
    function bindEvents() {
      // Мышь
      canvas.addEventListener('mousedown', onMouseDown);
      canvas.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);
      canvas.addEventListener('mouseleave', onMouseLeave);

      // Сенсор
      canvas.addEventListener('touchstart', onTouchStart, { passive: false });
      canvas.addEventListener('touchmove', onTouchMove, { passive: false });
      canvas.addEventListener('touchend', onTouchEnd);
      canvas.addEventListener('touchcancel', onTouchEnd);

      // Кнопка очистки
      clearBtn.addEventListener('click', () => {
        clearCanvasAction();
      });

      // Выбор цвета
      colorPicker.addEventListener('input', (e) => {
        currentColor = e.target.value;
      });
    }

    // ---------- СТАРТ ----------
    function initialRender() {
      // Устанавливаем фон по умолчанию
      pixelData.fill('#1c1c24');
      renderFullCanvas();
    }

    // Запуск всего
    initialRender();
    bindEvents();
    connectWebSocket();

    // Очистка при уходе со страницы (не обязательно, но хорошо)
    window.addEventListener('beforeunload', () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.close();
      }
      if (reconnectTimer) clearTimeout(reconnectTimer);
    });

  })();
</script>
</body>
</html>
